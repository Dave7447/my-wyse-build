name: Build Wyse 5070 OpenWrt Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Build Image
        run: |
          # 1. Download the Image Builder using the direct URL
          wget https://downloads.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.zstd
          
          # 2. Extract and enter directory
          tar -xf openwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.xz
          cd openwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64

          # 3. Disable signature checks to prevent the errors we saw locally
          sed -i 's/check_signature/0/g' include/download.mk || true

          # 4. Run the build with your package list
          make image \
            CONFIG_TARGET_EXT4_JOURNAL=y \
            CONFIG_GRUB_IMAGES=y \
            CONFIG_GRUB_EFI_IMAGES=y \
            KERNEL_PARTSIZE=64 \
            ROOTFS_PARTSIZE=2048 \
            PACKAGES="adblock attendedsysupgrade-common banip base-files bash bind-dig block-mount bmon btrfs-progs busybox ca-bundle ca-certificates cgi-io clamav collectd collectd-mod-cpu collectd-mod-exec collectd-mod-interface collectd-mod-iwinfo collectd-mod-load collectd-mod-memory collectd-mod-network collectd-mod-rrdtool collectd-mod-sqm crowdsec-firewall-bouncer curl diffutils dnsmasq docker-compose docker dockerd dropbear e2fsprogs file firewall4 freshclam fstools fwtool gawk getrandom grub2-bios-setup hostapd-common iftop intel-microcode iperf3 iptables-mod-extra iptables-mod-ipopt iptables-zz-legacy iw iwinfo jshn jsonfilter logrotate lsblk lscpu lsd lsns lynx mkf2fs msmtp msmtp-mta mtd nfs-kernel-server nftables-json odhcp6c odhcpd-ipv6only openssh-sftp-server openssl-util owut parted partx-utils ppp ppp-mod-pppoe procd procd-seccomp procd-ujail python3-base python3-pip qrencode resize2fs resolveip rpcbind rpcd runc samba4-server shadow-common shadow-useradd speedtest-netperf sqm-scripts sudo tc-tiny tcpdump telegraf-full tini ttyd ubox ubus ubusd uci uclient-fetch ucode uhttpd unbound-control unbound-daemon urandom-seed urngd usb-modeswitch usbutils usign wget-ssl wifi-scripts wireguard-tools wireless-regdb wpad-openssl libustream-mbedtls luci-app-adblock luci-app-attendedsysupgrade luci-app-banip luci-app-crowdsec-firewall-bouncer luci-app-dockerman luci-app-package-manager luci-app-sqm luci-app-statistics luci-app-unbound luci-base luci-compat luci-light luci-proto-ipv6 luci-proto-ppp luci-proto-wireguard luci-ssl"

          # 5. Prepare output
          mkdir -p ../output
          cp bin/targets/x86/64/*-generic-ext4-combined-efi.img.gz ../output/

      - name: Upload Finished Image
        uses: actions/upload-artifact@v4
        with:
          name: wyse-5070-openwrt-image
          path: output/
